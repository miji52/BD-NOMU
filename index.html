<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Une aventure de Nomu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="shell">
  <div class="card">
  <img class="cover" src="pages/cover.png" alt="Couverture" draggable="false" />

  <div class="meta">
    
    <p>Lecture interactive • swipe • plein écran</p>

    <div class="row">
      <a class="btn" id="startBtn" href="reader.html?page=1">Lire depuis le début</a>
      <a class="btn ghost" id="resumeBtn" href="#" style="display:none;">Reprendre</a>
    </div>
    <button id="soundBtn">🔊 Musique</button>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
  </div>
  </div>
<script>
  (function () {
    const key = "nomu_last_page";
    const resumeBtn = document.getElementById("resumeBtn");

    if (!resumeBtn) return;

    const p = parseInt(localStorage.getItem(key) || "1", 10);

    if (p && !isNaN(p) && p > 1) {
      resumeBtn.href = "reader.html?page=" + p;
      resumeBtn.textContent = "Reprendre (page " + p + ")";
      resumeBtn.style.display = "inline-block";
    }
    const btn = document.getElementById("soundBtn");
const music = document.getElementById("bgMusic");
    const cover = document.querySelector(".cover");

// volume de base
music.volume = 0.3;

let playing = false;

btn.addEventListener("click", () => {

  if (!playing) {

    music.currentTime = 0;
    music.play();
    if (cover) {
  cover.style.animation = "none";
  void cover.offsetWidth;
  cover.style.animation = "coverFloat 7s ease-in-out infinite";
   }

    // fade-in (montée progressive du son)
    music.volume = 0;
    let vol = 0;

    const fade = setInterval(() => {
      if (vol < 0.3) {
        vol += 0.02;
        music.volume = vol;
      } else {
        clearInterval(fade);
      }
    }, 100);

    btn.textContent = "🔇 Stop";

  } else {

    music.pause();
    btn.textContent = "🔊 Musique";

  }

  playing = !playing;
});
  })();
</script>


</body>
</html>
